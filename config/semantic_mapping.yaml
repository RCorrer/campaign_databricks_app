    description: Clientes Prime com maior renda e relacionamento consolidado
  - code: exclusive
    label: Exclusive
    source_view: main.campaign_sources.vw_publico_exclusive
    description: Clientes Exclusive com patrimônio elevado
  - code: pj
    label: PJ
    source_view: main.campaign_sources.vw_publico_pj
    description: Empresas e clientes pessoa jurídica
  - code: varejo
    label: Varejo
    source_view: main.campaign_sources.vw_publico_varejo
