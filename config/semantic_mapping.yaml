initial_audiences:
  - code: prime
    label: Prime
    source_view: main.fontes_campanha.vw_publico_prime
    description: Clientes pessoa física do segmento Prime.
  - code: exclusive
    label: Exclusive
    source_view: main.fontes_campanha.vw_publico_exclusive
    description: Clientes de alta renda e private com maior potencial comercial.
  - code: pj
    label: Pessoa Jurídica
    source_view: main.fontes_campanha.vw_publico_pj
    description: Empresas e clientes corporativos para ações de relacionamento.
  - code: varejo
    label: Varejo
    source_view: main.fontes_campanha.vw_publico_varejo
    description: Base massificada de pessoa física para campanhas recorrentes.
  - code: jovem_digital
    label: Jovem Digital
    source_view: main.fontes_campanha.vw_publico_jovem_digital
    description: Clientes jovens com alto engajamento digital.

native_fields:
  - field: tipo_cliente
    label: Tipo de cliente
    type: string
    operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
  - field: idade_anos
    label: Idade
    type: number
    operators: [GT, GTE, LT, LTE, EQUALS]
  - field: uf
    label: UF
    type: string
    operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
  - field: cidade
    label: Cidade
    type: string
    operators: [EQUALS, NOT_EQUALS, CONTAINS]
  - field: segmento
    label: Segmento
    type: string
    operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
  - field: subsegmento
    label: Subsegmento
    type: string
    operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
  - field: renda_mensal
    label: Renda mensal
    type: number
    operators: [GT, GTE, LT, LTE]
  - field: faixa_renda
    label: Faixa de renda
    type: string
    operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
  - field: meses_relacionamento
    label: Tempo de relacionamento em meses
    type: number
    operators: [GT, GTE, LT, LTE]
  - field: consentimento_marketing
    label: Consentimento de marketing
    type: boolean
    operators: [EQUALS, NOT_EQUALS]

themes:
  - key: cartoes
    label: Cartões
    table: main.cliente_360.tb_cartoes
    description: Produtos, limites, status e bandeira dos cartões do cliente.
    fields:
      - field: produto_cartao
        label: Produto do cartão
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN, CONTAINS]
      - field: status_cartao
        label: Status do cartão
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: bandeira_cartao
        label: Bandeira
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: limite_credito
        label: Limite de crédito
        type: number
        operators: [GT, GTE, LT, LTE]

  - key: contas
    label: Contas
    table: main.cliente_360.tb_contas
    description: Informações da conta principal e pacote contratado.
    fields:
      - field: tipo_conta
        label: Tipo de conta
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: status_conta
        label: Status da conta
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: nome_pacote
        label: Pacote da conta
        type: string
        operators: [EQUALS, NOT_EQUALS, CONTAINS]

  - key: investimentos
    label: Investimentos
    table: main.cliente_360.tb_investimentos
    description: Perfil do investidor e saldo investido.
    fields:
      - field: possui_investimento
        label: Possui investimento
        type: boolean
        operators: [EQUALS, NOT_EQUALS]
      - field: perfil_investidor
        label: Perfil do investidor
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: total_investido
        label: Total investido
        type: number
        operators: [GT, GTE, LT, LTE]

  - key: elegibilidade
    label: Elegibilidade
    table: main.cliente_360.tb_elegibilidade_ofertas
    description: Produtos elegíveis e limites pré-aprovados.
    fields:
      - field: produto
        label: Produto elegível
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN, CONTAINS]
      - field: status_elegibilidade
        label: Status da elegibilidade
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: elegivel
        label: Elegível
        type: boolean
        operators: [EQUALS, NOT_EQUALS]
      - field: limite_pre_aprovado
        label: Limite pré-aprovado
        type: number
        operators: [GT, GTE, LT, LTE]

  - key: credito
    label: Crédito
    table: main.cliente_360.tb_credito_perfil
    description: Score, comprometimento de renda e risco de crédito.
    fields:
      - field: score_bureau
        label: Score bureau
        type: number
        operators: [GT, GTE, LT, LTE]
      - field: score_interno
        label: Score interno
        type: number
        operators: [GT, GTE, LT, LTE]
      - field: renda_presumida
        label: Renda presumida
        type: number
        operators: [GT, GTE, LT, LTE]
      - field: atraso_maximo_dias_12m
        label: Atraso máximo em 12 meses
        type: number
        operators: [GT, GTE, LT, LTE]
      - field: restricao_bureau
        label: Restrição bureau
        type: boolean
        operators: [EQUALS, NOT_EQUALS]

  - key: emprestimos
    label: Empréstimos
    table: main.cliente_360.tb_emprestimos
    description: Contratos ativos e histórico de atraso.
    fields:
      - field: produto_emprestimo
        label: Produto do empréstimo
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: status_emprestimo
        label: Status do empréstimo
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: dias_atraso
        label: Dias de atraso
        type: number
        operators: [GT, GTE, LT, LTE]

  - key: canais_digitais
    label: Canais digitais
    table: main.cliente_360.tb_canais_digitais
    description: Engajamento digital, opt-ins e frequência transacional.
    fields:
      - field: app_ativo
        label: App ativo
        type: boolean
        operators: [EQUALS, NOT_EQUALS]
      - field: aceite_whatsapp
        label: Aceite WhatsApp
        type: boolean
        operators: [EQUALS, NOT_EQUALS]
      - field: qtd_logins_30d
        label: Logins em 30 dias
        type: number
        operators: [GT, GTE, LT, LTE]
      - field: frequencia_transacional
        label: Frequência transacional
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
