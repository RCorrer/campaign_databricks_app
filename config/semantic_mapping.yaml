initial_audiences:
  - code: prime
    label: Prime
    source_view: main.campaign_sources.vw_publico_prime
    description: Clientes pessoa física com segmento Prime, dados nativos de cliente e relacionamento base.
  - code: exclusive
    label: Exclusive
    source_view: main.campaign_sources.vw_publico_exclusive
    description: Clientes de alta renda e private com maior potencial comercial.
  - code: pj
    label: PJ
    source_view: main.campaign_sources.vw_publico_pj
    description: Empresas e clientes corporate para ações B2B e CRM empresarial.
  - code: varejo
    label: Varejo
    source_view: main.campaign_sources.vw_publico_varejo
    description: Base massificada de pessoa física com foco em campanhas recorrentes.
  - code: young
    label: Jovem Digital
    source_view: main.campaign_sources.vw_publico_jovem_digital
    description: Clientes jovens com alto engajamento digital.

native_fields:
  - field: customer_type
    label: Tipo de cliente
    type: string
    operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
  - field: age_years
    label: Idade
    type: number
    operators: [GT, GTE, LT, LTE, EQUALS]
  - field: state
    label: UF
    type: string
    operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
  - field: city
    label: Cidade
    type: string
    operators: [EQUALS, NOT_EQUALS, CONTAINS]
  - field: segment
    label: Segmento
    type: string
    operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
  - field: subsegment
    label: Subsegmento
    type: string
    operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
  - field: monthly_income
    label: Renda mensal
    type: number
    operators: [GT, GTE, LT, LTE]
  - field: income_band
    label: Faixa de renda
    type: string
    operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
  - field: relationship_months
    label: Tempo de relacionamento em meses
    type: number
    operators: [GT, GTE, LT, LTE]
  - field: marketing_consent
    label: Consentimento marketing
    type: boolean
    operators: [EQUALS, NOT_EQUALS]

themes:
  - key: cartoes
    label: Cartões
    table: main.customer_360.tb_cartoes
    description: Produtos, limites, status e bandeira dos cartões do cliente.
    fields:
      - field: card_product
        label: Produto do cartão
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN, CONTAINS]
      - field: card_status
        label: Status do cartão
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: card_brand
        label: Bandeira
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: credit_limit
        label: Limite de crédito
        type: number
        operators: [GT, GTE, LT, LTE]
  - key: contas
    label: Contas
    table: main.customer_360.tb_contas
    description: Informações da conta principal e pacote contratado.
    fields:
      - field: account_type
        label: Tipo de conta
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: account_status
        label: Status da conta
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: package_name
        label: Pacote da conta
        type: string
        operators: [EQUALS, NOT_EQUALS, CONTAINS]
  - key: investimentos
    label: Investimentos
    table: main.customer_360.tb_investimentos
    description: Perfil do investidor e saldo investido.
    fields:
      - field: has_investment
        label: Possui investimento
        type: boolean
        operators: [EQUALS, NOT_EQUALS]
      - field: investor_profile
        label: Perfil do investidor
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: total_invested
        label: Total investido
        type: number
        operators: [GT, GTE, LT, LTE]
  - key: elegibilidade
    label: Elegibilidade
    table: main.customer_360.tb_elegibilidade_ofertas
    description: Produtos elegíveis e limites pré-aprovados.
    fields:
      - field: produto
        label: Produto elegível
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN, CONTAINS]
      - field: status_elegibilidade
        label: Status da elegibilidade
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: elegivel
        label: Elegível
        type: boolean
        operators: [EQUALS, NOT_EQUALS]
      - field: limite_pre_aprovado
        label: Limite pré-aprovado
        type: number
        operators: [GT, GTE, LT, LTE]
  - key: credito
    label: Crédito
    table: main.customer_360.tb_credito_perfil
    description: Score, comprometimento de renda e risco de crédito.
    fields:
      - field: bureau_score
        label: Score bureau
        type: number
        operators: [GT, GTE, LT, LTE]
      - field: internal_score
        label: Score interno
        type: number
        operators: [GT, GTE, LT, LTE]
      - field: renda_presumida
        label: Renda presumida
        type: number
        operators: [GT, GTE, LT, LTE]
      - field: atraso_max_dias_12m
        label: Atraso máximo 12 meses
        type: number
        operators: [GT, GTE, LT, LTE]
      - field: restricao_bureau
        label: Restrição bureau
        type: boolean
        operators: [EQUALS, NOT_EQUALS]
  - key: emprestimos
    label: Empréstimos
    table: main.customer_360.tb_emprestimos
    description: Contratos ativos e histórico de atraso.
    fields:
      - field: loan_product
        label: Produto do empréstimo
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: loan_status
        label: Status do empréstimo
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
      - field: delay_days
        label: Dias de atraso
        type: number
        operators: [GT, GTE, LT, LTE]
  - key: canais_digitais
    label: Canais digitais
    table: main.customer_360.tb_canais_digitais
    description: Engajamento digital, opt-ins e frequência transacional.
    fields:
      - field: mobile_app_active
        label: App ativo
        type: boolean
        operators: [EQUALS, NOT_EQUALS]
      - field: whatsapp_opt_in
        label: Opt-in WhatsApp
        type: boolean
        operators: [EQUALS, NOT_EQUALS]
      - field: login_count_30d
        label: Logins 30 dias
        type: number
        operators: [GT, GTE, LT, LTE]
      - field: frequencia_transacional
        label: Frequência transacional
        type: string
        operators: [EQUALS, NOT_EQUALS, IN, NOT_IN]
