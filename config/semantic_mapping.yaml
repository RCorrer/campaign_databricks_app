native_fields:
  idade:
    label: Idade
    type: number
    operators: ["=", "!=", ">", ">=", "<", "<="]
  uf:
    label: UF
    type: string
    operators: ["=", "!="]
  cidade:
    label: Cidade
    type: string
    operators: ["=", "!=", "LIKE"]
  renda_mensal:
    label: Renda mensal
    type: number
    operators: ["=", ">", ">=", "<", "<="]
  faixa_renda:
    label: Faixa de renda
    type: string
    operators: ["=", "!="]
  segmento:
    label: Segmento
    type: string
    operators: ["=", "!="]
  tipo_cliente:
    label: Tipo cliente
    type: string
    operators: ["=", "!="]

themes:
  cartoes:
    label: Cartões
    table: main.customer_360.tb_cartoes
    fields:
      produto_cartao:
        label: Produto do cartão
        type: string
        operators: ["=", "!=", "LIKE"]
      limite_total:
        label: Limite total
        type: number
        operators: [">", ">=", "<", "<="]
      status_cartao:
        label: Status cartão
        type: string
        operators: ["=", "!="]
  credito:
    label: Crédito
    table: main.customer_360.tb_credito_perfil
    fields:
      score_credito:
        label: Score de crédito
        type: number
        operators: [">", ">=", "<", "<="]
      atraso_max_dias:
        label: Atraso máximo dias
        type: number
        operators: [">", ">=", "<", "<="]
      limite_pre_aprovado:
        label: Limite pré-aprovado
        type: number
        operators: [">", ">=", "<", "<="]
  investimentos:
    label: Investimentos
    table: main.customer_360.tb_investimentos
    fields:
      valor_total_investido:
        label: Valor total investido
        type: number
        operators: [">", ">=", "<", "<="]
      perfil_investidor:
        label: Perfil investidor
        type: string
        operators: ["=", "!="]
  elegibilidade:
    label: Elegibilidade
    table: main.customer_360.tb_elegibilidade_ofertas
    fields:
      oferta:
        label: Oferta
        type: string
        operators: ["=", "!=", "LIKE"]
      elegivel:
        label: Elegível
        type: boolean
        operators: ["="]
