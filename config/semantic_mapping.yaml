        label: Contas
        join_key: cpf_cnpj
        fields:
          - field: segment
            label: Segmento do cliente
            type: string
            operators: [EQUALS, IN, NOT_IN]
          - field: tempo_relacionamento_meses
            label: Tempo de relacionamento em meses
            type: number
            operators: [GT, GTE, LT, LTE]
